services:
  graph-mcp:
    build:
      context: .
      dockerfile: Dockerfile.graph
    ports:
      - "8000:8000"
    env_file: .env

  salesforce-mcp:
    build:
      context: .
      dockerfile: Dockerfile.salesforce
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - SF_CLIENT_ID=${SF_CLIENT_ID}
      - SF_CLIENT_SECRET=${SF_CLIENT_SECRET}
      - SF_LOGIN_URL=${SF_LOGIN_URL}
      - SF_OAUTH_CALLBACK_URL=${SF_OAUTH_CALLBACK_URL}

  smartsales-mcp:
    build:
      context: .
      dockerfile: Dockerfile.smartsales
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - GRANT_TYPE=${GRANT_TYPE}
      - CODE_SMARTSALES=${CODE_SMARTSALES}
      - CLIENT_ID_SMARTSALES=${CLIENT_ID_SMARTSALES}
      - CLIENT_SECRET_SMARTSALES=${CLIENT_SECRET_SMARTSALES}
