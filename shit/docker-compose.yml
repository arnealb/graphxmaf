services:
  graph-mcp:
    build:
      context: .
      dockerfile: Dockerfile.graph
    ports:
      - "8000:8000"
    env_file: .env

  salesforce-mcp:
    build:
      context: .
      dockerfile: Dockerfile.salesforce
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - SF_CLIENT_ID=${SF_CLIENT_ID}
      - SF_USERNAME=${SF_USERNAME}
      - SF_PRIVATE_KEY=${SF_PRIVATE_KEY}
