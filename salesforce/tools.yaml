- name: get_opportunities
  description: >
    List Salesforce opportunities, optionally filtered by account ID, stage, or
    minimum amount, with support for extra columns and additional field filters.

    IMPORTANT: In Salesforce, "open" opportunities are those where IsClosed = false.
    To list open opportunities, use filters={"IsClosed": "false"}.
    To list closed opportunities (Closed Won / Closed Lost), use filters={"IsClosed": "true"}.
    Do NOT use stage="Open" — that will match nothing.

    `stage` — use only when the user specifies an exact stage name such as
    "Proposal/Price Quote" or "Negotiation/Review". Leave null for "open/closed" requests.

    `min_amount` — minimum Amount value (inclusive); use for "amount greater than X" queries.

    `extra_fields` — list of additional SOQL field names to include.
    Allowed values: Probability, Type, LeadSource, ForecastCategory,
    Description, CreatedDate, LastModifiedDate.

    `not_null_fields` — fields that must NOT be null in the result.
    Example — "opportunities with an amount": not_null_fields=["Amount"]
    Example — "opportunities linked to an account": not_null_fields=["Account.Name"]
    Allowed values: Name, Amount, CloseDate, StageName, Account.Name.

    `filters` — dict of {SoqlField: value} for WHERE conditions.
    Probability and Amount use exact equality; IsClosed uses boolean (true/false);
    all others use LIKE.
    Allowed filter fields: Name, StageName, Account.Name, Type, LeadSource,
    ForecastCategory, Description, Probability, Amount, IsClosed.

    Base fields always returned: Id, Name, StageName, Amount, CloseDate, Account.Name.
  method: get_opportunities
  params:
    - name: account_id
      type: "str | None"
    - name: stage
      type: "str | None"
      description: >
        Exact stage name filter (e.g. "Proposal/Price Quote"). Do NOT use "Open" or "Closed" here;
        use filters={"IsClosed": "false"} for open and filters={"IsClosed": "true"} for closed.
    - name: min_amount
      type: "str | None"
      description: >
        Minimum opportunity amount (inclusive), e.g. "10000" for amount >= 10000.
    - name: extra_fields
      type: "list[str] | None"
      description: >
        Extra SOQL field names to SELECT, e.g. ["Probability", "Type"].
    - name: not_null_fields
      type: "list[str] | None"
      description: >
        Fields that must NOT be null, e.g. ["Amount"] to exclude opportunities without an amount.
        Allowed values: Name, Amount, CloseDate, StageName, Account.Name.
    - name: filters
      type: "dict[str, str] | None"
      description: >
        Additional field filters as {SoqlField: value}.
        Use {"IsClosed": "false"} for open opportunities, {"IsClosed": "true"} for closed.

