- name: find_contacts
  description: >
    Search for Salesforce contacts whose Name or Email contains the given keyword,
    optionally fetching extra columns and/or filtering on specific field values.

    `query` must be a plain keyword (name or email fragment), NOT a SOQL condition.

    Base fields always returned: Id, FirstName, LastName, Email, Account.Name.

    `extra_fields` — list of additional SOQL field names to include in the response.
    Allowed values: Phone, MobilePhone, Title, Department, MailingStreet,
    MailingCity, MailingState, MailingPostalCode, MailingCountry,
    LeadSource, CreatedDate.

    `not_null_fields` — fields that must NOT be null in the result.
    Use when the user explicitly asks for a field to be present.
    Example — "contacts with their email addresses": not_null_fields=["Email"]
    Example — "contacts with a phone number": not_null_fields=["Phone"]
    Allowed values: Email, FirstName, LastName, Name, Phone, MobilePhone,
    Title, Department, Account.Name.

    `filters` — dict of {SoqlField: value} for WHERE conditions (LIKE substring match).
    Allowed filter fields: FirstName, LastName, Email, Account.Name, Phone, Title,
    Department, MailingCity, MailingState, MailingPostalCode, MailingCountry,
    LeadSource, CreatedDate.

    IMPORTANT: If you filter by a non-base field (e.g. Department, Title), you MUST
    also add that field to extra_fields so it appears in the response.
    Example — find contacts in Sales department and show their department:
      filters={"Department": "Sales"}, extra_fields=["Department"]
    Example — find contacts with Manager in their title and show their title:
      filters={"Title": "Manager"}, extra_fields=["Title"]
  method: find_contacts
  params:
    - name: query
      type: "str | None"
      description: >
        Name or email keyword (plain text). Must NOT be a SOQL expression.
    - name: extra_fields
      type: "list[str] | None"
      description: >
        Extra SOQL field names to SELECT, e.g. ["Department", "Title"].
        Always include a field here if you are filtering by it and want it shown.
    - name: not_null_fields
      type: "list[str] | None"
      description: >
        Fields that must NOT be null, e.g. ["Email"] to exclude contacts without an email.
        Allowed values: Email, FirstName, LastName, Name, Phone, MobilePhone,
        Title, Department, Account.Name.
    - name: filters
      type: "dict[str, str] | None"
      description: >
        Additional field filters as {SoqlField: value}, e.g. {"Department": "Sales"}.

