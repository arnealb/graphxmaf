- name: find_leads
  description: >
    Search for Salesforce leads whose Name, Email, or Company contains the given keyword,
    optionally fetching extra columns and/or filtering on specific field values.

    `query` must be a plain keyword, NOT a SOQL condition.

    `extra_fields` — list of additional SOQL field names to include.
    Allowed values: Phone, MobilePhone, Title, Industry, LeadSource, Street, City,
    State, PostalCode, Country, Rating, NumberOfEmployees, AnnualRevenue, CreatedDate.

    `not_null_fields` — fields that must NOT be null in the result.
    Example — "leads with an email address": not_null_fields=["Email"]
    Example — "leads with a company name": not_null_fields=["Company"]
    Allowed values: Email, FirstName, LastName, Company, Status,
    Phone, Industry, Country, City.

    `filters` — dict of {SoqlField: value} for WHERE conditions.
    String fields use LIKE; NumberOfEmployees and AnnualRevenue use exact equality;
    IsConverted uses boolean (true/false).
    Allowed filter fields: FirstName, LastName, Email, Company, Status, Phone, Title,
    Industry, LeadSource, City, State, PostalCode, Country, Rating,
    NumberOfEmployees, AnnualRevenue, IsConverted.

    NOTE: To find converted leads, use filters={"IsConverted": "true"}.
    To find unconverted leads, use filters={"IsConverted": "false"}.
    When filtering by Industry and you want Industry in the response, also add "Industry"
    to extra_fields.
  method: find_leads
  params:
    - name: query
      type: "str | None"
      description: >
        Name, email, or company keyword (plain text). Must NOT be a SOQL expression.
    - name: extra_fields
      type: "list[str] | None"
      description: >
        Extra SOQL field names to SELECT, e.g. ["Industry", "City"].
        Include "Industry" when filtering by industry to show it in the response.
    - name: not_null_fields
      type: "list[str] | None"
      description: >
        Fields that must NOT be null, e.g. ["Email"] to exclude leads without an email.
        Allowed values: Email, FirstName, LastName, Company, Status,
        Phone, Industry, Country, City.
    - name: filters
      type: "dict[str, str] | None"
      description: >
        Additional field filters as {SoqlField: value}, e.g. {"Country": "Netherlands"}.
        Use {"IsConverted": "true"} for converted leads, {"IsConverted": "false"} for unconverted.

