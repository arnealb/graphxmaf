- name: get_cases
  description: >
    List Salesforce cases, optionally filtered by account ID, status, or open/closed state,
    with support for extra columns and additional field filters.

    IMPORTANT: In Salesforce, "open" cases are NOT filtered by Status = "Open" (that status
    does not exist). Use filters={"IsClosed": "false"} for open cases and
    filters={"IsClosed": "true"} for closed cases.
    Actual case statuses are: New, Working, Escalated, Closed.

    `status` — use for exact status values like "New", "Working", "Escalated", "Closed".
    Do NOT use "Open" as a status value; use filters={"IsClosed": "false"} instead.

    Base fields always returned: Id, CaseNumber, Subject, Status, Priority, Account.Name, CreatedDate.

    `extra_fields` — list of additional SOQL field names to include.
    Allowed values: Description, Origin, Type, Reason, ClosedDate, LastModifiedDate.

    `not_null_fields` — fields that must NOT be null in the result.
    Example — "cases with a description": not_null_fields=["Description"]
    Example — "cases linked to an account": not_null_fields=["Account.Name"]
    Allowed values: Subject, Status, Priority, Account.Name,
    CaseNumber, Description, ClosedDate.

    `filters` — dict of {SoqlField: value} for WHERE conditions.
    IsClosed uses boolean (true/false); all others use LIKE substring match.
    Allowed filter fields: Subject, Status, Priority, Account.Name,
    Description, Origin, Type, Reason, IsClosed.

    NOTE: Include ClosedDate in extra_fields when the user asks for the close date of cases.
  method: get_cases
  params:
    - name: account_id
      type: "str | None"
    - name: status
      type: "str | None"
      description: >
        Exact status value: "New", "Working", "Escalated", or "Closed".
        Do NOT use "Open" — use filters={"IsClosed": "false"} for open cases instead.
    - name: extra_fields
      type: "list[str] | None"
      description: >
        Extra SOQL field names to SELECT, e.g. ["Origin", "Reason", "ClosedDate"].
        Always include "ClosedDate" when the user asks for the case close date.
    - name: not_null_fields
      type: "list[str] | None"
      description: >
        Fields that must NOT be null, e.g. ["Description"] to exclude cases without a description.
        Allowed values: Subject, Status, Priority, Account.Name,
        CaseNumber, Description, ClosedDate.
    - name: filters
      type: "dict[str, str] | None"
      description: >
        Additional field filters as {SoqlField: value}.
        Use {"IsClosed": "false"} for open cases, {"IsClosed": "true"} for closed cases.
        Example for high-priority open cases: filters={"IsClosed": "false", "Priority": "High"}.
